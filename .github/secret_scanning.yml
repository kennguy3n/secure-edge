# GitHub secret scanning configuration.
#
# The DLP accuracy corpus under agent/internal/dlp/testdata/corpus/
# contains ~5,000 synthetic samples that are deliberately crafted to
# match the same regular expressions our pipeline detects (Stripe,
# Twilio, GitHub PAT, AWS, etc.) so we can measure recall against the
# production rules. These values are randomly generated from
# math/rand with a fixed seed — they are NOT real credentials. We
# exclude them from GitHub's push-protection / secret-scanning
# detectors so the corpus can live alongside the rules it tests.
paths-ignore:
  - 'agent/internal/dlp/testdata/corpus/**'
