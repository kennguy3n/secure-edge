# Secure Edge — PERSONAL preset (fall-open, individual developer use).
#
# This file is one of three reference configs that ship alongside the
# packaged `config.yaml`. It mirrors the out-of-the-box defaults: no
# per-install API token, no Native Messaging HMAC pinning, no profile
# signature pinning, and the fall-open ("personal") enforcement-mode
# posture in which a missing agent verdict silently allows the
# paste / form / drop / fetch through.
#
# Use this preset when:
#
#   - You are installing the agent on a single workstation.
#   - You want DLP coaching without a hard-fail posture.
#   - You have no managed deployment infrastructure (MDM, signing
#     host, on-disk secret distribution) to wire the harder knobs in
#     §3 / §10 of docs/admin-guide.md against.
#
# When in doubt this is the right starting point. You can always move
# to config.team.example.yaml or config.managed.example.yaml later
# without rebuilding — every knob below is also reachable via
# config.yaml in place.
#
# IMPORTANT: the values below intentionally match the packaged
# `config.yaml` defaults. Keep them in sync if you edit one — both
# files are followed by docs/admin-guide.md §2 as authoritative.

# DNS resolver
upstream_dns: "8.8.8.8:53"
dns_listen: "127.0.0.1:5353"

# Local agent HTTP API. Used by the Electron tray, the browser
# extension service worker, and the rules/scan endpoints.
api_listen: "127.0.0.1:8080"

# SQLite state lives next to the binary in the packaged install.
db_path: "secure-edge.db"
stats_flush_interval: 60s

# Bundled rule files. Each entry resolves relative to the agent's
# working directory (so the packaged install loads them from the
# rules/ folder installed alongside the binary).
rule_paths:
  - rules/ai_chat_blocked.txt
  - rules/ai_code_blocked.txt
  - rules/ai_allowed.txt
  - rules/ai_chat_dlp.txt
  - rules/phishing.txt
  - rules/social.txt
  - rules/news.txt

# DLP pipeline. Leaving these blank disables /api/dlp/* (returns 503)
# while DNS, policies, and stats keep working.
dlp_patterns: rules/dlp_patterns.json
dlp_exclusions: rules/dlp_exclusions.json

# Phase 3 rule updater. Leaving rule_update_url blank disables the
# updater.
rule_update_url: ""
rule_update_interval: 6h
rules_dir: rules

# Phase 4 local MITM proxy. proxy_enabled=false (default) leaves the
# listener stopped — /api/proxy/enable can start it at runtime.
proxy_listen: "127.0.0.1:8443"
proxy_enabled: false
ca_cert_path: ""
ca_key_path: ""
proxy_pinning_bypass: []

# Phase 7 / C2 — fall-open ("personal") posture. A missing agent
# verdict silently allows the gesture through. Toasts only surface
# for verdicts the agent actually returned.
enforcement_mode: personal

# The remaining knobs are deliberately left unset on the personal
# preset. Uncomment them only if you understand the rollout
# implications. The cross-references point to docs/admin-guide.md.
#
# §2.1  bridge_mac_required           (Native Messaging HMAC pinning — leave off until §10.x rollout)
# §2.2  risky_file_extensions          (browser-side filename blocklist — fine on personal too, but the
#                                       baked-in 34-entry default already runs without setting this key)
# §3.1  profile_public_key             (Ed25519 verifier for enterprise profiles)
# §4    rule_update_public_key         (Ed25519 verifier for rule manifests)
# §10.1 allowed_extension_ids          (pin the local-API origin allowlist to specific extension IDs)
# §10.1 api_token_path / api_token_required (per-install bearer token for the local API)
