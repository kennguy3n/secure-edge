# nfpm packaging config for the Secure Edge Go agent.
#
# Build with:
#   cd agent
#   make build
#   nfpm package --packager deb --config nfpm.yaml --target dist/
#
# Requires `nfpm` (https://nfpm.goreleaser.com/) on the build host.

name: "secure-edge-agent"
arch: "amd64"
platform: "linux"
version: "0.1.0"
section: "net"
priority: "optional"
maintainer: "Secure Edge Maintainers <maintainers@example.invalid>"
description: |
  Secure Edge — privacy-first, on-device DNS blocker and DLP agent. Blocks
  unauthorized AI tools at the DNS layer and inspects content sent to
  approved AI tools through a layered DLP pipeline. No URLs, domains, IPs,
  or DLP match content are ever written to disk.
vendor: "Secure Edge"
homepage: "https://github.com/kennguy3n/secure-edge"
license: "MIT"

depends:
  - libc6

contents:
  - src: ./secure-edge-agent
    dst: /usr/bin/secure-edge-agent
    file_info:
      mode: 0755

  - src: ../config.yaml
    dst: /etc/secure-edge/config.yaml
    type: config|noreplace
    file_info:
      mode: 0644

  - src: ../rules/
    dst: /etc/secure-edge/rules/
    file_info:
      mode: 0644

  - src: ../scripts/linux/secure-edge.service
    dst: /lib/systemd/system/secure-edge.service
    file_info:
      mode: 0644

  - src: ../scripts/linux/configure-dns.sh
    dst: /usr/share/secure-edge/configure-dns.sh
    file_info:
      mode: 0755

scripts:
  postinstall: ./scripts/postinstall.sh
  preremove:   ./scripts/preremove.sh
