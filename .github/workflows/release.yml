name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-agent:
    name: Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Build agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out="dist/secure-edge-agent-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "$out" ./cmd/agent
          echo "Built $out"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/dist/secure-edge-agent-*
          if-no-files-found: error

  build-agent-onnx:
    # Optional ML-augmented build (W3). Produces
    # `secure-edge-agent-onnx-<os>-<arch>` binaries with -tags=onnx,
    # bundled together with the per-OS onnxruntime CPU shared library
    # from the official Microsoft release. Each archive is
    # SHA-pinned (the onnxruntime tarball against
    # scripts/onnxruntime-manifest.txt) so a tampered upstream cannot
    # silently land in a release.
    #
    # CGO is REQUIRED — github.com/yalue/onnxruntime_go uses cgo to
    # dlopen() the onnxruntime shared library at startup. We use the
    # native runner for each target OS so the system C toolchain is
    # already correct; Linux arm64 cross-compiles from x64 via
    # gcc-aarch64-linux-gnu.
    name: Agent w/ ONNX (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ort_archive: onnxruntime-linux-x64-1.25.0.tgz
            ort_libpath: onnxruntime-linux-x64-1.25.0/lib/libonnxruntime.so.1.25.0
            ort_libname: libonnxruntime.so
            cc: gcc
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ort_archive: onnxruntime-linux-aarch64-1.25.0.tgz
            ort_libpath: onnxruntime-linux-aarch64-1.25.0/lib/libonnxruntime.so.1.25.0
            ort_libname: libonnxruntime.so
            cc: aarch64-linux-gnu-gcc
            cross_apt: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          - goos: darwin
            goarch: amd64
            runner: macos-13
            ort_archive: onnxruntime-osx-x86_64-1.25.0.tgz
            ort_libpath: onnxruntime-osx-x86_64-1.25.0/lib/libonnxruntime.1.25.0.dylib
            ort_libname: libonnxruntime.dylib
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ort_archive: onnxruntime-osx-arm64-1.25.0.tgz
            ort_libpath: onnxruntime-osx-arm64-1.25.0/lib/libonnxruntime.1.25.0.dylib
            ort_libname: libonnxruntime.dylib
          - goos: windows
            goarch: amd64
            ext: .exe
            runner: windows-latest
            ort_archive: onnxruntime-win-x64-1.25.0.zip
            ort_libpath: onnxruntime-win-x64-1.25.0/lib/onnxruntime.dll
            ort_libname: onnxruntime.dll
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Install cross C toolchain (Linux arm64)
        if: matrix.cross_apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_apt }}

      - name: Verify pinned SHA-256 for onnxruntime archive
        shell: bash
        run: |
          archive="${{ matrix.ort_archive }}"
          want="$(awk -v a="$archive" '$2==a {print $1; exit}' scripts/onnxruntime-manifest.txt)"
          if [ -z "$want" ]; then
            echo "::error::no pin for $archive in scripts/onnxruntime-manifest.txt"
            exit 1
          fi
          echo "ORT_EXPECTED_SHA=$want" >> "$GITHUB_ENV"

      - name: Download + verify onnxruntime (Linux / macOS)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ort
          archive="${{ matrix.ort_archive }}"
          curl -fL --show-error --silent \
            "https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/${archive}" \
            -o "ort/${archive}"
          got="$(shasum -a 256 "ort/${archive}" 2>/dev/null | awk '{print $1}' || sha256sum "ort/${archive}" | awk '{print $1}')"
          if [ "$got" != "$ORT_EXPECTED_SHA" ]; then
            echo "::error::SHA-256 mismatch for $archive: expected $ORT_EXPECTED_SHA got $got"
            exit 1
          fi
          echo "  pin matches: $got"
          tar -xzf "ort/${archive}" -C ort
          install -m 0755 "ort/${{ matrix.ort_libpath }}" "ort/${{ matrix.ort_libname }}"

      - name: Download + verify onnxruntime (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $archive = '${{ matrix.ort_archive }}'
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/$archive"
          New-Item -ItemType Directory -Force -Path ort | Out-Null
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile "ort/$archive"
          $got = (Get-FileHash -Algorithm SHA256 "ort/$archive").Hash.ToLower()
          if ($got -ne $env:ORT_EXPECTED_SHA) {
            Write-Error "SHA-256 mismatch for $archive: expected $env:ORT_EXPECTED_SHA got $got"
            exit 1
          }
          Write-Host "  pin matches: $got"
          Expand-Archive -LiteralPath "ort/$archive" -DestinationPath ort -Force
          Copy-Item -Force "ort/${{ matrix.ort_libpath }}" "ort/${{ matrix.ort_libname }}"

      - name: Build agent (onnx)
        working-directory: agent
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          out="dist/secure-edge-agent-onnx-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -tags=onnx -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "$out" ./cmd/agent
          ls -la "$out"

      - name: Assemble bundle
        shell: bash
        run: |
          set -euo pipefail
          base="secure-edge-agent-onnx-${{ matrix.goos }}-${{ matrix.goarch }}"
          stage="stage/${base}"
          mkdir -p "$stage"
          cp "agent/dist/${base}${{ matrix.ext }}" "$stage/secure-edge-agent${{ matrix.ext }}"
          cp "ort/${{ matrix.ort_libname }}" "$stage/${{ matrix.ort_libname }}"
          cp INSTALL_ML.md "$stage/INSTALL_ML.md"
          cp scripts/ml-model-manifest.txt "$stage/ml-model-manifest.txt"
          cp scripts/onnxruntime-manifest.txt "$stage/onnxruntime-manifest.txt"
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd stage && 7z a "../dist/${base}.zip" "${base}")
          else
            (cd stage && tar -czf "../dist/${base}.tar.gz" "${base}")
          fi
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: agent-onnx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/secure-edge-agent-onnx-*
          if-no-files-found: error

  build-electron:
    name: Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: npm ci
        working-directory: electron
        run: npm ci

      - name: build renderer + main
        working-directory: electron
        run: npm run build

      - name: electron-builder
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            electron/dist-electron/*.dmg
            electron/dist-electron/*.AppImage
            electron/dist-electron/*.deb
            electron/dist-electron/*.exe
            electron/dist-electron/*.zip
            electron/dist-electron/*.yml
            electron/dist-electron/*.blockmap
          if-no-files-found: warn

  build-extension:
    name: Browser extension (Chrome + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: install
        working-directory: extension
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: build chrome
        working-directory: extension
        run: npm run build

      - name: build firefox
        working-directory: extension
        run: npm run build:firefox

      - name: package
        working-directory: extension
        run: |
          mkdir -p artefacts
          # Chrome: zip the dist/ tree alongside the manifest and assets.
          (cd dist && zip -r "../artefacts/secure-edge-chrome-${GITHUB_REF_NAME}.zip" .)
          # Firefox: same idea but as an .xpi (still a zip under the hood).
          (cd dist-firefox && zip -r "../artefacts/secure-edge-firefox-${GITHUB_REF_NAME}.xpi" .)

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension/artefacts/*
          if-no-files-found: error

  build-extension-safari:
    name: Browser extension (Safari)
    # xcrun safari-web-extension-converter ships with Xcode, so the
    # Safari Web Extension wrapper can only be produced on a macOS
    # runner. The dist-safari/ payload itself is cross-platform; only
    # the Xcode project (.app bundle) requires darwin.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: install
        working-directory: extension
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: build safari
        working-directory: extension
        run: npm run build:safari

      - name: package
        working-directory: extension
        run: |
          mkdir -p artefacts
          # Raw extension payload — usable for sideloading via Safari's
          # Develop menu and for the converter on any other macOS host.
          (cd dist-safari && zip -r "../artefacts/secure-edge-safari-${GITHUB_REF_NAME}.zip" .)
          # Xcode wrapper project, in case downstream packaging wants
          # to build the .app outside the release pipeline.
          if [ -d dist-safari-xcode ]; then
            (cd dist-safari-xcode && zip -r "../artefacts/secure-edge-safari-xcode-${GITHUB_REF_NAME}.zip" .)
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: extension-safari
          path: extension/artefacts/*
          if-no-files-found: warn

  build-installers:
    name: Native installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build-agent]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: agent-bins
          merge-multiple: true

      - name: macOS .pkg
        if: matrix.os == 'macos-latest'
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          BIN="agent-bins/secure-edge-agent-darwin-${ARCH}"
          if [ ! -f "$BIN" ]; then BIN="agent-bins/secure-edge-agent-darwin-amd64"; fi
          SECURE_EDGE_VERSION="${GITHUB_REF_NAME#v}" SECURE_EDGE_AGENT_BIN="$BIN" \
            ./scripts/macos/build-pkg.sh

      - name: Linux .deb / .rpm
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -sSL https://github.com/goreleaser/nfpm/releases/download/v2.40.0/nfpm_2.40.0_Linux_x86_64.tar.gz \
            | tar -xz -C /tmp nfpm
          sudo mv /tmp/nfpm /usr/local/bin/
          SECURE_EDGE_VERSION="${GITHUB_REF_NAME#v}" SECURE_EDGE_ARCH=amd64 \
            SECURE_EDGE_AGENT_BIN="$PWD/agent-bins/secure-edge-agent-linux-amd64" \
            ./scripts/linux/build-packages.sh

      - name: Windows .msi
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "agent-bins/secure-edge-agent-windows-amd64.exe"
          $version = "${{ github.ref_name }}" -replace '^v',''
          # Install the WiX dotnet tool, pinned to v5.0.2 (the last
          # release in the v4/v5 line before WiX v6 introduced the
          # Open Source Maintenance Fee EULA — WiX v7 actively rejects
          # `wix build` runs that have not accepted the OSMF terms with
          # error WIX7015). v5.0.2 still supports the v4 wxs schema
          # namespace and the native <Files> element used by
          # secure-edge.wxs to harvest the rules folder at build time.
          $wixVersion = '5.0.2'
          if (-not (Get-Command wix -ErrorAction SilentlyContinue)) {
              dotnet tool install --global wix --version $wixVersion
              $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          } else {
              # Replace any pre-installed image-shipped wix with the
              # pinned version so the EULA check is deterministic
              # across runner image rolls.
              dotnet tool update --global wix --version $wixVersion
          }
          wix --version
          ./scripts/windows/build-msi.ps1 -AgentExePath $bin -Version $version

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/macos/*.pkg
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/windows/*.msi
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: [build-agent, build-agent-onnx, build-electron, build-extension, build-extension-safari, build-installers]
    runs-on: ubuntu-latest
    # id-token + attestations are required for cosign keyless signing and
    # actions/attest-build-provenance. contents:write was already implied
    # by the workflow-level permissions block.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # Source checkout is required so anchore/sbom-action can read
      # agent/go.mod, electron/package-lock.json, and
      # extension/package-lock.json. The original release job had no
      # checkout because it only flattened pre-built artefacts.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: flatten artefacts
        run: |
          mkdir -p release
          # `secure-edge-agent-*` matches both the default CGO-free
          # binaries from build-agent and the onnx-tagged bundles
          # from build-agent-onnx (`secure-edge-agent-onnx-<os>-<arch>.tar.gz` /
          # `.zip`), which is the desired outcome — both are
          # release-grade artefacts and need to land in SHA256SUMS +
          # cosign coverage.
          find artefacts -type f \( -name '*.pkg' -o -name '*.msi' -o -name '*.deb' \
            -o -name '*.rpm' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.exe' \
            -o -name '*.zip' -o -name '*.xpi' -o -name 'secure-edge-agent-*' \
            -o -name '*.tar.gz' -o -name '*.yml' -o -name '*.blockmap' \) -exec cp {} release/ \;
          ls -la release/

      # ----------------------------------------------------------------
      # D1a: release-artifact hardening — SHA256SUMS + SBOM + cosign
      # keyless + SLSA build provenance. Platform-native code signing
      # (Apple codesign, Microsoft signtool, dpkg-sig, rpm --addsign,
      # GPG) is deferred to PR5b once the respective certificates are
      # provisioned (see PHASES.md:156).
      # ----------------------------------------------------------------

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: SBOM for Go agent (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./agent
          format: cyclonedx-json
          output-file: release/secure-edge-agent.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: SBOM for Electron tray (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./electron
          format: cyclonedx-json
          output-file: release/secure-edge-electron.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: SBOM for browser extension (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./extension
          format: cyclonedx-json
          output-file: release/secure-edge-extension.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SHA256SUMS
        working-directory: release
        run: |
          # Generate SHA256SUMS over every file currently in release/,
          # including the just-written SBOMs, but excluding SHA256SUMS
          # itself AND the .manifest temp file (which is created by this
          # very pipeline before `find` traverses the directory, and
          # would otherwise be included in the listing and then removed,
          # producing a SHA256SUMS line that always fails verification).
          #
          # NUL-separated piping (find -print0 | sort -z | xargs -0) is
          # required because electron-builder's default productName is
          # 'Secure Edge', so several release artefacts have filenames
          # containing spaces (e.g. 'Secure Edge Setup 0.1.0.exe',
          # 'Secure Edge-0.1.0-arm64.dmg'). The previous
          # `sha256sum -- $(cat .manifest)` invocation word-split on
          # whitespace and tried to hash 'Secure', 'Edge', 'Setup', ...
          # as separate files, all of which failed with
          # 'No such file or directory'.
          find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS' \
            ! -name '.manifest' \
            -printf '%f\0' | sort -z > .manifest
          xargs -0 -a .manifest sha256sum -- > SHA256SUMS
          rm .manifest
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: cosign sign-blob each artefact
        working-directory: release
        env:
          COSIGN_YES: 'true'
        run: |
          # Sign every artefact in release/ EXCEPT signature/certificate
          # metadata and SHA256SUMS itself (signed in the next step so it
          # covers the SBOMs but not the freshly-emitted .sig/.pem files).
          shopt -s nullglob
          for f in *; do
            case "$f" in
              *.sig|*.pem|SHA256SUMS) continue ;;
            esac
            echo "Signing $f"
            cosign sign-blob \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      - name: cosign sign-blob SHA256SUMS
        working-directory: release
        env:
          COSIGN_YES: 'true'
        run: |
          # Sign SHA256SUMS after individual artefacts so its sha256 lines
          # already cover all SBOMs. The .sig/.pem files generated above
          # are NOT in SHA256SUMS by design — they are individually
          # verifiable via cosign without the manifest.
          cosign sign-blob \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          # Attest the agent binaries, installers, extension/electron
          # bundles, and SBOMs. We deliberately do NOT attest the cosign
          # .sig/.pem files (they are themselves signature material) or
          # the SHA256SUMS manifest (which is already cosign-signed).
          # Agent binaries are enumerated explicitly per OS/arch so the
          # `secure-edge-agent-*` wildcard does not over-match the
          # `secure-edge-agent-<os>-<arch>.sig` / `.pem` files written by
          # the preceding `cosign sign-blob` step. Installer / bundle
          # patterns use extension-anchored globs (`*.pkg`, `*.exe`,
          # `*.cdx.json`, ...) which by construction never match
          # `<artefact>.sig` / `<artefact>.pem`, so those are safe.
          subject-path: |
            release/secure-edge-agent-linux-amd64
            release/secure-edge-agent-linux-arm64
            release/secure-edge-agent-darwin-amd64
            release/secure-edge-agent-darwin-arm64
            release/secure-edge-agent-windows-amd64.exe
            release/*.pkg
            release/*.msi
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.AppImage
            release/*.exe
            release/*.zip
            release/*.tar.gz
            release/*.xpi
            release/*.cdx.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # Mark D1a dry-run tags (v0.0.0-d1a-dryrun and any other
          # v0.0.0-* tag) as prereleases so they do not steal the
          # "Latest" badge on the releases page during validation.
          prerelease: ${{ contains(github.ref_name, 'dryrun') || startsWith(github.ref_name, 'v0.0.0') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
