<!doctype html>
<html lang="en">
<head>

  <title>Secure Edge integration fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    textarea { width: 100%; height: 200px; padding: 8px; }
  </style>
</head>
<body>

    <button type="submit">Send</button>
  </form>
