# Secure Edge — TEAM preset (incremental rollout, intermediate posture).
#
# This file is one of three reference configs that ship alongside the
# packaged `config.yaml`. It sits between config.personal.example.yaml
# (fall-open, no secrets pinned) and config.managed.example.yaml
# (fail-closed, every signed surface required).
#
# The team preset is the right intermediate step when an operator is
# rolling out Secure Edge to a small group of users — long enough to
# stand up the per-install API token plumbing (so the local agent's
# state-changing endpoints stop accepting any-extension-origin
# requests), but not yet ready to flip the Native Messaging HMAC,
# Ed25519 profile signing, or the fail-closed enforcement posture.
#
# Use this preset when:
#
#   - Every endpoint can be expected to read a per-install API token
#     from a known on-disk path (`api_token_path`).
#   - You want a warning toast on agent-unavailable instead of silent
#     fall-open, so users know when a scan was skipped.
#   - You have not yet generated org-level Ed25519 keys for
#     `profile_public_key` / `rule_update_public_key`, OR you have
#     them but you have not finished rolling the matching signed
#     bundle to every endpoint (so unsigned profiles are still
#     accepted with a warn-once log line — see §3.1 / §4 of
#     docs/admin-guide.md for the staged-rollout posture).
#   - The HMAC-producing extension build has not yet reached every
#     endpoint (so `bridge_mac_required: false` keeps the agent
#     lenient with a one-time stderr warning per connection — see
#     §2.1 of docs/admin-guide.md for the rollout sequence).
#
# Once the warnings above stop appearing across your fleet and the
# signed bundle has propagated, graduate the deployment to
# config.managed.example.yaml.

# DNS resolver
upstream_dns: "8.8.8.8:53"
dns_listen: "127.0.0.1:5353"

# Local agent HTTP API.
api_listen: "127.0.0.1:8080"

# SQLite state lives next to the binary in the packaged install.
db_path: "secure-edge.db"
stats_flush_interval: 60s

# Bundled rule files.
rule_paths:
  - rules/ai_chat_blocked.txt
  - rules/ai_code_blocked.txt
  - rules/ai_allowed.txt
  - rules/ai_chat_dlp.txt
  - rules/phishing.txt
  - rules/social.txt
  - rules/news.txt

# DLP pipeline.
dlp_patterns: rules/dlp_patterns.json
dlp_exclusions: rules/dlp_exclusions.json

# Phase 3 rule updater. Leave the URL blank if your fleet does not
# yet have a signed manifest endpoint — populate it (and
# `rule_update_public_key` below) when you graduate to managed.
rule_update_url: ""
rule_update_interval: 6h
rules_dir: rules

# Phase 4 local MITM proxy. Off by default; flip to true once the
# CA is provisioned on every endpoint.
proxy_listen: "127.0.0.1:8443"
proxy_enabled: false
ca_cert_path: ""
ca_key_path: ""
proxy_pinning_bypass: []

# Phase 7 / C2 — fall-open with a warning toast on agent-unavailable.
# Users see "Secure Edge agent unavailable — paste sent without
# scan" so they know the gesture was not inspected.
enforcement_mode: team

# Phase 7 / A1 — pin the local-API origin allowlist to your fleet's
# extension IDs. Replace the placeholder with the value shown on
# chrome://extensions after a managed-policy install. Empty list
# keeps the legacy any-extension-origin behaviour and logs a startup
# warning.
allowed_extension_ids:
  - "<your-chrome-extension-id>"

# Phase 7 / A2 — per-install bearer token. The agent persists a
# crypto/rand 32-byte hex token to this path on first run; the
# Electron tray and browser extension read it and attach it as
# "Authorization: Bearer <token>" on every API call.
api_token_path: /var/lib/secure-edge/api-token

# `api_token_required: true` rejects any state-changing API request
# without a valid bearer. Leave at false during the staged rollout
# if a portion of your fleet is still on the pre-A2 Electron build.
api_token_required: true

# Phase 7 / C1 — Native Messaging bridge HMAC. Left lenient on the
# team preset (per §2.1 rollout sequence): the agent logs a one-
# time stderr warning per connection if a frame's MAC is missing or
# invalid but keeps serving scans. Flip to true once every extension
# build in your fleet is producing MACs.
bridge_mac_required: false

# Phase 7 / B2 — browser-side filename blocklist. The team preset
# enables a conservative subset focused on the canonical Windows /
# Linux executable / script payloads. Operators with developer-heavy
# fleets may add `js` / `sh` / `py` under config.managed.example.yaml
# once they have measured impact; do not add them under the team
# preset until then.
risky_file_extensions:
  - exe
  - scr
  - ps1
  - msi
  - bat
  - cmd
  - vbs

# §3.1 / §4 of docs/admin-guide.md — Ed25519 signing keys.
# DELIBERATELY left unset on the team preset. Unsigned profiles /
# manifests are accepted with a warn-once log line. Configure these
# (and re-sign your bundle on every update) before graduating to
# config.managed.example.yaml.
# profile_public_key: ""
# rule_update_public_key: ""
