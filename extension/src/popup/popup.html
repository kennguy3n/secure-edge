    <div class="row">
        <span>Version</span>
        <span id="agent-version">—</span>
    </div>
    <div class="row">
        <span>Uptime</span>
        <span id="agent-uptime">—</span>
    </div>
    <small>Pastes into approved AI tools are scanned by the local agent (127.0.0.1).</small>
    <script type="module" src="../../dist/popup/popup.js"></script>

</html>
