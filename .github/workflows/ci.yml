name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: Go Agent (test + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true
          cache-dependency-path: agent/go.sum

      - name: go test
        working-directory: agent
        run: make test

      - name: go vet
        working-directory: agent
        run: make lint

      - name: go build
        working-directory: agent
        run: make build

  electron:
    name: Electron Tray (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: npm ci
        working-directory: electron
        run: npm ci

      - name: typecheck
        working-directory: electron
        run: npm run typecheck

  extension:
    name: Browser Extension (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: npm ci (or install)
        working-directory: extension
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: typecheck
        working-directory: extension
        run: npm run typecheck

      - name: test
        working-directory: extension
        run: npm test
