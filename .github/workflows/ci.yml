name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: Go Agent (test + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true
          cache-dependency-path: agent/go.sum

      - name: go test (with coverage)
        working-directory: agent
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: enforce DLP package coverage threshold
        working-directory: agent
        run: |
          # Phase 6 Task 26: agent/internal/dlp/ is the privacy-critical
          # surface. Fail CI if its coverage drops below 80%.
          pct=$(go tool cover -func=coverage.out | awk '/internal\/dlp\// {sub(/%/,"",$3); sum+=$3; n++} END { if (n==0) print 0; else printf "%.1f", sum/n }')
          echo "DLP package average coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 80.0) { exit 1 } }'

      - name: upload coverage artefact
        uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: agent/coverage.out
          if-no-files-found: error

      - name: go vet
        working-directory: agent
        run: make lint

      - name: go build
        working-directory: agent
        run: make build

  electron:
    name: Electron Tray (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: npm ci
        working-directory: electron
        run: npm ci

      - name: typecheck
        working-directory: electron
        run: npm run typecheck

  extension:
    name: Browser Extension (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: npm ci (or install)
        working-directory: extension
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: typecheck
        working-directory: extension
        run: npm run typecheck

      - name: build (tsc + IIFE bundle)
        working-directory: extension
        run: npm run build

      - name: test
        working-directory: extension
        run: npm test
