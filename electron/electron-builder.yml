appId: com.shieldnet.secureedge.tray
productName: Secure Edge
files:
  - dist/**/*
  - package.json
  - resources/**/*
asarUnpack:
  - resources/**/*
mac:
  category: public.app-category.utilities
  target:
    - dmg
linux:
  target:
    - AppImage
    - deb
win:
  target:
    - nsis
# Publish artifacts to GitHub Releases so electron-updater can find
# the latest .yml manifest and incremental binaries.
publish:
  - provider: github
    owner: kennguy3n
    repo: secure-edge
    releaseType: release
