# Secure Edge agent configuration (packaged default).
#
# This file is installed to /etc/secure-edge/config.yaml on Linux (see
# agent/nfpm.yaml) and C:\ProgramData\SecureEdge\config.yaml on Windows
# (see installer/wix/secure-edge.wxs). Treat it as a starting point
# tuned for an out-of-the-box install — operators are expected to
# override values via the agent's `--config` flag or by editing this
# file in place.
#
# Every value here mirrors the example in README.md; keep them in sync
# so the README is the canonical reference.

# DNS resolver
upstream_dns: "8.8.8.8:53"
dns_listen: "127.0.0.1:5353"

# Local agent HTTP API. Used by the Electron tray, the browser
# extension service worker, and the rules/scan endpoints.
api_listen: "127.0.0.1:8080"

# SQLite state lives next to the binary in the packaged install.
# When run from source the file is created in the working directory.
db_path: "secure-edge.db"
stats_flush_interval: 60s

# Bundled rule files. Each entry resolves relative to the agent's
# working directory (so the packaged install loads them from the
# rules/ folder installed alongside the binary).
rule_paths:
  - rules/ai_chat_blocked.txt
  - rules/ai_code_blocked.txt
  - rules/ai_allowed.txt
  - rules/ai_chat_dlp.txt
  - rules/phishing.txt
  - rules/social.txt
  - rules/news.txt

# DLP pipeline. Leaving these blank disables /api/dlp/* (returns 503)
# while DNS, policies, and stats keep working.
dlp_patterns: rules/dlp_patterns.json
dlp_exclusions: rules/dlp_exclusions.json

# Phase 3 rule updater. Leaving rule_update_url blank disables the
# updater; everything else keeps working.
rule_update_url: ""
rule_update_interval: 6h
rules_dir: rules

# Phase 7 / A3 — Ed25519 public key the agent verifies rule-manifest
# signatures against. When set, an unsigned or mis-signed manifest
# is rejected before any rule file is downloaded. When left empty,
# the agent falls back to per-file SHA-256 checks only and logs a
# one-time warning on the first fetch — kept for backwards
# compatibility with existing deployments. Sign manifests with
# `go run ./agent/cmd/sign-rule-manifest -in rules/manifest.json
# -key <ed25519-priv.hex>`. Recommended for any deployment that
# pulls rule updates over an untrusted CDN or mirror.
# rule_update_public_key: ""

# Phase 4 local MITM proxy. proxy_enabled=false (default) leaves the
# listener stopped — /api/proxy/enable can start it at runtime.
proxy_listen: "127.0.0.1:8443"
proxy_enabled: false
ca_cert_path: ""
ca_key_path: ""
proxy_pinning_bypass: []

# Phase 6 DLP engine tuning. Omitting a field keeps the built-in default.
# large_content_threshold: 51200
# dlp_cache_ttl_seconds: 5
# dlp_cache_capacity: 256
# dlp_rate_limit_per_sec: 100
# dlp_disabled_categories: []

# Agent self-update. Both fields are required to enable.
# agent_update_manifest_url: ""
# agent_update_public_key: ""

# A1: allowed extension IDs for control-path callers. When non-empty
# the local API server only honours chrome-extension:// / moz-extension:// /
# safari-web-extension:// origins whose ID appears in this list for
# state-changing endpoints. An empty list keeps the legacy "any
# installed extension" behaviour and logs a startup warning.
# allowed_extension_ids:
#   - your-chrome-extension-id
#   - 01234567-89ab-cdef-0123-456789abcdef

# A2: per-install API capability token.
#
# api_token_path is the on-disk location where the agent persists a
# crypto/rand 32-byte hex token (created with mode 0600 if missing).
# The Electron tray and the browser extension read that file (the
# extension over Native Messaging "hello") and attach it as
# "Authorization: Bearer <token>" on every API call.
#
# The Electron tray's DEFAULT_API_TOKEN_PATH (and the agent's Go
# helper api.DefaultAPITokenPath) auto-discover a per-OS location:
#   - linux:   $XDG_CONFIG_HOME/secure-edge/api-token (default ~/.config/secure-edge/api-token)
#   - darwin:  ~/Library/Application Support/secure-edge/api-token
#   - windows: %APPDATA%/secure-edge/api-token
# Point api_token_path at that location and a fresh install needs
# zero extra env-vars on the tray launcher. The agent prints the
# resolved value on startup when api_token_path is empty so you can
# copy/paste it. Packaged installs that run the agent as a system
# service typically choose a different location (e.g. systemd
# StateDirectory /var/lib/secure-edge/api-token) and point the tray
# at it via SECURE_EDGE_API_TOKEN_PATH.
#
# api_token_required gates enforcement: when false the middleware
# runs in staged mode (wrong tokens are rejected with 401, missing
# headers fall through to origin-based auth) so operators can roll
# out the matching Electron / extension builds before flipping the
# knob to true. Leave api_token_path empty to disable the feature.
# api_token_path: ""
# api_token_required: false

# Phase 7 / C2 — fail policy when the agent cannot return a verdict
# (timeout, network error, content too large for inline scan). The
# agent only advertises the mode; the browser extension enforces it.
#
#   personal (default) — fall open, current behaviour. The paste /
#                        submit / drop / fetch proceeds and a
#                        toast never surfaces.
#   team               — fall open but show a warning toast so the
#                        user knows the scan was skipped and can
#                        choose to retry once the agent is back.
#   managed            — fall closed. Requests that would otherwise
#                        bypass the scanner are blocked at the
#                        edge and the user sees a policy toast
#                        explaining why. In this mode the
#                        extension also stops silently allowing
#                        payloads above its inline-scan size limit.
#
# Use "managed" for enterprise deployments where the operator has
# committed to a fail-closed posture; the privacy-first default
# stays at "personal".
# enforcement_mode: personal

# Phase 7 / B2 — block risky file extensions at the upload gesture
# (browser extension). The browser-extension's file-upload-interceptor
# matches the selected/dropped filename's extension against this list
# BEFORE any content is read or sent to the agent, so the filename
# never leaves the page for a B2 verdict. A risky-extension match
# always blocks, regardless of `enforcement_mode`. Three states:
#
#   - Key omitted (default)         → extension uses its baked-in
#                                     31-entry default (Windows /
#                                     macOS / Linux executables,
#                                     installers, scripts, disk
#                                     images, Java archives;
#                                     `.js` is NOT in the default).
#   - Empty list `[]`               → opts out of B2 entirely.
#   - Populated list                → replaces the baked-in default
#                                     verbatim.
#
# Entries are case-insensitive; leading dots are stripped; blanks
# are dropped. See docs/admin-guide.md §2.2 for the full default
# list + rollout guidance.
# risky_file_extensions:
#   - exe
#   - scr
#   - ps1
#   - msi
